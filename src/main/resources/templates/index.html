<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Start page / index</title>
 <style>
    :root {
    --neon-pink: #ff2fd1;
    --neon-blue: #00e5ff;
    --neon-purple: #7c3aed;
    --neon-green: #00ff9c;
    --dark-bg: #0f0f1a;
    --card-dark: rgba(255, 255, 255, 0.06);
    --glass: rgba(255, 255, 255, 0.08);
    }

    * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    }

    body {
    font-family: "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
    background: linear-gradient(
    rgba(5, 5, 15, 0.85),
    rgba(5, 5, 15, 0.95)
    ),
    url("../images/bowlingpins.jpg");

    background-size: cover;
    background-position: center;
    color: white;
    }

    /* FRAME */

    .frame {
    width: 94vw;
    height: 92vh;
    margin: 4vh auto;
    border-radius: 24px;
    backdrop-filter: blur(20px);
    background: var(--glass);
    box-shadow:
    0 0 60px rgba(0, 229, 255, 0.3),
    0 0 120px rgba(255, 47, 209, 0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
    }

    /* MAIN LAYOUT */

    .main {
    display: flex;
    flex: 1;
    }

    /* CONTENT */

    .content {
    flex: 1;
    padding: 3rem;
    position: relative;
    }

    .content h1 {
    text-align: center;
    font-size: 3rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 2.5rem;
    animation: glowText 3s ease-in-out infinite alternate;
    }

    @keyframes glowText {
    from {
    text-shadow: 0 0 10px var(--neon-pink);
    }
    to {
    text-shadow: 0 0 25px var(--neon-blue);
    }
    }

    /* SCROLL AREA */

    .list-scroll-container {
    height: 55vh;
    overflow-y: auto;
    padding-right: 10px;
    }

    /* Custom neon scrollbar */

    .list-scroll-container::-webkit-scrollbar {
    width: 8px;
    }

    .list-scroll-container::-webkit-scrollbar-thumb {
    background: linear-gradient(var(--neon-pink), var(--neon-blue));
    border-radius: 10px;
    }

    /* RESERVATION CARDS */

    .reservation-card {
    background: var(--card-dark);
    padding: 1.2rem 1.5rem;
    border-radius: 16px;
    margin-bottom: 1.2rem;
    backdrop-filter: blur(12px);
    transition: all 0.3s ease;
    border-left: 4px solid var(--neon-blue);
    position: relative;
    overflow: hidden;
    }

    .reservation-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.08),
    transparent
    );
    transform: translateX(-100%);
    transition: 0.6s;
    }

    .reservation-card:hover::before {
    transform: translateX(100%);
    }

    .reservation-card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow:
    0 0 15px var(--neon-blue),
    0 0 30px var(--neon-purple);
    }

    /* TEXT STYLES */

    .datetimeline {
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 6px;
    }

    .typeline {
    font-size: 0.9rem;
    opacity: 0.8;
    }

    /* SIDEBAR */

    .sidebar {
    width: 260px;
    padding: 3rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    background: linear-gradient(
    180deg,
    #14142b,
    #0d0d1a
    );
    border-left: 1px solid rgba(255,255,255,0.1);
    }

    /* NEON BUTTONS */

    .sidebar a {
    text-decoration: none;
    }

    .sidebar button {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    border: 2px solid var(--neon-blue);
    background: transparent;
    color: var(--neon-blue);
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    }

    .sidebar button:hover {
    background: var(--neon-blue);
    color: black;
    box-shadow:
    0 0 15px var(--neon-blue),
    0 0 30px var(--neon-blue);
    transform: translateX(8px);
    }

    /* FOOTER */

    .footer {
    height: 60px;
    background: linear-gradient(
    90deg,
    var(--neon-pink),
    var(--neon-purple),
    var(--neon-blue)
    );
    opacity: 0.2;
    }

    </style>
</head>
<body>


<div class="frame">

    <div th:replace="fragments/header :: headerFragment"></div>

    <div class="main">

        <main class="content">
            <h1>Oversigt</h1>

            <div class="list-scroll-container">

                <div th:each="reservation : ${reservations}">

                    <div class="reservation-card">
                        <p class="datetimeline"
                           th:text="${reservation.date + ' - ' + reservation.time + ' - ' + reservation.name}">
                        </p>

                        <p class="typeline"
                           th:text="${reservation.type + '  -  Baner: ' + reservation.lanes}">
                        </p>
                    </div>

                </div>
            </div>
        </main>

        <nav class="sidebar">
            <a th:href="@{/lanes}">
                <button>Book bane</button>
            </a>
            <a th:href="@{/tableBooking}">
                <button>Book bord</button>
            </a>
            <a th:href="@{/maintenance}">
                <button>Drift</button>
            </a>
            <a th:href="@{/maintenancelist}">
                <button>Driftsliste</button>
            </a>
        </nav>

    </div>

    <footer class="footer">

    </footer>

</div>


</body>
</html>
