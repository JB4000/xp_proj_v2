<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<footer th:fragment="footerFragment" class="site-footer">

    <div class="footer-inner">
        <button class="back-button"
                th:onclick="|window.location.href='@{/}'|">
            ← Tilbage
        </button>

        <div class="footer-status">
            🎳 Bowling Control Panel
        </div>
    </div>

    <style>

        .site-footer {
            height: 80px;
            position: relative;
            background: linear-gradient(
                    90deg,
                    #0f0f1a,
                    #14142b
            );
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        /* Animated neon line across top */
        .site-footer::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 3px;
            background: linear-gradient(
                    90deg,
                    #ff2fd1,
                    #00e5ff,
                    #7c3aed
            );
            animation: footerGlow 6s linear infinite;
        }

        @keyframes footerGlow {
            from { transform: translateX(0); }
            to { transform: translateX(50%); }
        }

        .footer-inner {
            width: 90%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-status {
            font-weight: 600;
            letter-spacing: 2px;
            font-size: 0.9rem;
            opacity: 0.6;
        }

        /* BACK BUTTON */

        .back-button {
            padding: 12px 26px;
            border-radius: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            border: 2px solid #00e5ff;
            background: transparent;
            color: #00e5ff;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .back-button::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
                    120deg,
                    transparent,
                    rgba(255,255,255,0.2),
                    transparent
            );
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .back-button:hover::before {
            transform: translateX(100%);
        }

        .back-button:hover {
            background: #00e5ff;
            color: black;
            box-shadow:
                    0 0 15px #00e5ff,
                    0 0 30px #00e5ff;
            transform: translateY(-3px);
        }

        .back-button:active {
            transform: scale(0.95);
        }

    </style>

</footer>

</body>
</html>
