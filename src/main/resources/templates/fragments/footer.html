<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<footer th:fragment="footerFragment" class="site-footer">
    <button class="back-button" th:onclick="|window.location.href='@{/}'|">Tilbage</button>
    <style>
        .site-footer {
            width: 100%;
            padding: 20px;
            border-top: 3px solid grey;
            background-color: #ffffff;

            display: flex;
            justify-content: center;
        }

        .back-button {
            padding: 10px 15px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background-color: dodgerblue;
            color: white;
            cursor: pointer;
        }

        .back-button:hover {
            background-color: darkred;
        }
    </style>
</footer>
</body>
</html>
